kind = "mobile"
previewPath = "/patient-app/"
title = "LINESETU Patient App"
version = "1.0.0"
id = "artifacts/patient-app"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/patient-app/", "/node_modules/", "/_expo/", "/__metro/" ]
localPort = 20117

[services.development]
run = "pnpm --filter @workspace/patient-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/patient-app", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/patient-app", "run", "serve" ]

[services.env]
PORT = "20117"
BASE_PATH = "/patient-app/"
